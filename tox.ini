    pytz==2022.2.1
    pytest==8.4.2
    pytest-asyncio
    openapi-core==0.22.0
    openapi-spec-validator<0.8.0,>=0.7.0
    open-aea==2.1.0rc6
    open-aea-ledger-ethereum==2.1.0rc6
