    requests>=2.28.1,<2.33.0
    typing_extensions>=3.10.0.2
    openai==1.93.0
    bases==0.3.0
    typing_validation==1.1.0
    tweepy==4.14.0
    farcaster==0.7.12
    twitter_text_parser==3.0.0
